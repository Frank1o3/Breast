name: Wheels

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Prepare ccache directory
        if: runner.os == 'Linux'
        run: mkdir -p ccache

      - name: Cache ccache
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/*.cpp', '**/*.hpp', '**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel

      - run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"

          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"

          CIBW_SKIP: "*-musllinux_*"
          CIBW_BUILD_VERBOSITY: "1"

          CIBW_ENVIRONMENT: CMAKE_ARGS="-DBREAST_CORE_ONLY=ON"
          CMAKE_ARGS: "-DBREAST_CORE_ONLY=ON"

          CIBW_BEFORE_ALL_LINUX: |
            yum install -y ccache || true

          CIBW_ENVIRONMENT_LINUX: >
            CC="ccache gcc"
            CXX="ccache g++"
            CCACHE_DIR=/project/ccache
            CMAKE_BUILD_PARALLEL_LEVEL=4
            CMAKE_ARGS="-DBREAST_CORE_ONLY=ON"

          CIBW_ENVIRONMENT_PASS_LINUX: CCACHE_DIR

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
